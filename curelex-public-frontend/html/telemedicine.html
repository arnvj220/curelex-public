<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Telemedicine - CURELEX</title>
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body class="dashboard-page">
    <!-- Header -->
    <header class="dashboard-header-fixed">
        <div class="header-container">
            <a href="patient-dashboard.html" class="back-home">
                <i class="fas fa-arrow-left"></i> Back to Dashboard
            </a>
            <div class="header-user">
                <span id="telePatientName">Booking Appointment</span>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="dashboard-main">
        <div class="dashboard-welcome telemedicine-welcome">
            <h1>Telemedicine Appointment</h1>
            <p>Fill in details to book your online consultation</p>
        </div>

        <!-- Telemedicine Form Card -->
        <div class="dashboard-card full-width telemedicine-form-card">
            <div class="card-header">
                <i class="fas fa-video"></i>
                <h3>Appointment Details</h3>
            </div>
            <div class="card-body">
                <form id="telemedicineForm">
                    <div class="form-grid">
                        <div class="form-group">
                            <label for="patientName">Patient Name *</label>
                            <input type="text" id="patientName" required>
                        </div>
                        <div class="form-group">
                            <label for="patientAge">Age *</label>
                            <input type="number" id="patientAge" min="1" max="150" required>
                        </div>
                        <div class="form-group">
                            <label for="symptoms">Symptoms *</label>
                            <textarea id="symptoms" rows="3" placeholder="Describe your symptoms..."
                                required></textarea>
                        </div>
                        <div class="form-group full-width">
                            <label for="appointmentTime">Preferred Time *</label>
                            <input type="datetime-local" id="appointmentTime" required>
                        </div>
                        <div class="form-group">
                            <label for="doctor">Assigned Doctor *</label>
                            
                            <select id="doctor" required>
                                <option value="">Loading doctors...</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-actions">
                        <button type="button" class="btn btn-secondary" id="cancelTelemedicine">Cancel</button>
                        <button type="submit" class="btn btn-primary btn-full">Book Appointment</button>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <!-- Toast -->
    <div class="toast" id="teleToast">
        <div class="toast-content">
            <i class="fas fa-bell"></i>
            <span id="teleToastMessage">Notification</span>
        </div>
    </div>

    <script src="../js/script.js"></script>
    <script>
        // Prefill from current user
        const token = localStorage.getItem("token");
        const currentUser = localStorage.getItem("curelex-current-user");
        let user;
        if (currentUser) {
            user = JSON.parse(currentUser);
            document.getElementById('patientName').value = user.name || 'Patient';
            document.getElementById('patientAge').value = user.age || '';
            document.getElementById('telePatientName').textContent = `Booking for ${user.name}`;
        }

        // Form submission
        function showSuccess(appointment, meetingLink) {
            const successDiv = document.querySelector('.telemedicine-form-card .card-body');

            successDiv.innerHTML = `
      <div class="success-message">
        <h3>Appointment Booked Successfully!</h3>
        <p>Doctor ID: ${appointment.doctorId}</p>
        <p>Time: ${new Date(appointment.appointmentTime).toLocaleString()}</p>
      </div>

      <button class="btn btn-primary btn-full" onclick="window.open('${meetingLink}', '_blank')">
        Join Meeting
      </button>

      <button class="btn btn-secondary btn-full" 
        onclick="window.location.href='patient-dashboard.html'" 
        style="margin-top:1rem;">
        Back to Dashboard
      </button>
    `;
        }

        document.getElementById('telemedicineForm').addEventListener('submit', async function (e) {
            e.preventDefault();

            try {


                const payload = {
                    patientId: user.id,
                    doctorId: document.getElementById('doctor').value,
                    symptoms: document.getElementById('symptoms').value,
                    appointmentTime: document.getElementById('appointmentTime').value,

                };
                

                const res = await fetch(`http://localhost:5000/api/appointments/book`, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": `Bearer ${token}`
                    },
                    body: JSON.stringify(payload)
                });
                const data = await res.json();
                

                const meetingLink = data?.appointment?.meetingLink;

                if (data.message != "Appointment booked successfully") throw new Error(data.message);

                showSuccess(data.appointment, meetingLink);

            } catch (err) {
                console.error(err);
                showTeleToast("Failed to book appointment", "error");
            }
        });

        // Cancel
        document.getElementById('cancelTelemedicine').addEventListener('click', () => {
            window.location.href = 'patient-dashboard.html';
        });

        // Toast function for telemedicine page
        function showTeleToast(message, type = 'info') {
            const toastEl = document.getElementById('teleToast');
            const msgEl = document.getElementById('teleToastMessage');
            const icon = toastEl.querySelector('i');

            msgEl.textContent = message;
            if (type === 'success') {
                icon.className = 'fas fa-check-circle';
                icon.style.color = '#22c55e';
            }
            toastEl.classList.add('active');

            setTimeout(() => toastEl.classList.remove('active'), 4000);
        }
        async function loadDoctors() {
            try {
                const res = await fetch("http://localhost:5000/api/doctors/all");
                const data = await res.json();
                let doctors;
                if (data.success == true) {
                    doctors = data.doctors;
                }
                

                const doctorSelect = document.getElementById("doctor");
                doctorSelect.innerHTML = '<option value="">Select Doctor</option>';

                doctors
                    .filter(doc => doc.verificationStatus === "approved") 
                    .forEach(doc => {
                        
                        const option = document.createElement("option");

                        option.value = doc.id; 
                        option.textContent = `${doc.name} (${doc.specialization})`;

                        doctorSelect.appendChild(option);
                    });

            } catch (err) {
                console.error("Error loading doctors:", err);
            }
        }
        document.addEventListener('DOMContentLoaded', () => {
            loadDoctors();
        });
    </script>

    <style>
        /* Additional styles for telemedicine page */
        .telemedicine-welcome {
            text-align: center;
            margin-bottom: 2rem;
        }

        .telemedicine-welcome h1 {
            color: var(--primary-color);
        }

        .telemedicine-form-card .form-grid {
            gap: 1rem;
        }

        .form-group.full-width {
            grid-column: 1 / -1;
        }

        .form-group textarea {
            resize: vertical;
        }

        .form-actions {
            display: flex;
            gap: 1rem;
            margin-top: 1.5rem;
        }

        .form-actions .btn-full {
            flex: 1;
        }

        .success-message {
            text-align: center;
            padding: 2rem;
            color: var(--text-secondary);
        }

        .success-message h3 {
            color: var(--text-primary);
            margin: 1rem 0;
        }

        @media (max-width: 768px) {
            .form-actions {
                flex-direction: column;
            }
        }
    </style>
</body>

</html>
